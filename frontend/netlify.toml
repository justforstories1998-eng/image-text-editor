# ═══════════════════════════════════════
# Netlify Deployment Configuration
# ═══════════════════════════════════════

[build]
  publish = "."
  command = "echo 'Static site — no build needed'"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200